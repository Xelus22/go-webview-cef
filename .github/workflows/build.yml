name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libappindicator3-dev

      - name: Cache CEF
        id: cache-cef
        uses: actions/cache@v4
        with:
          path: third_party/cef
          key: cef-linux-${{ hashFiles('**/setup_cef.go') }}

      - name: Setup CEF
        if: steps.cache-cef.outputs.cache-hit != 'true'
        run: go run scripts/setup_cef.go

      - name: Build
        run: bash scripts/build.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: demo-linux
          path: build/linux_amd64/

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Cache CEF
        id: cache-cef
        uses: actions/cache@v4
        with:
          path: third_party/cef
          key: cef-darwin-${{ hashFiles('**/setup_cef.go') }}

      - name: Setup CEF
        if: steps.cache-cef.outputs.cache-hit != 'true'
        run: go run scripts/setup_cef.go

      - name: Build
        run: bash scripts/build.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: demo-macos
          path: build/darwin_amd64/

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Cache CEF
        id: cache-cef
        uses: actions/cache@v4
        with:
          path: third_party/cef
          key: cef-windows-${{ hashFiles('**/setup_cef.go') }}

      - name: Setup CEF
        if: steps.cache-cef.outputs.cache-hit != 'true'
        run: go run scripts/setup_cef.go

      - name: Build
        run: powershell -ExecutionPolicy Bypass -File scripts/build.ps1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: demo-windows
          path: build/windows_amd64/

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run tests
        run: go test -v ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run go vet
        run: go vet ./...

      - name: Run go fmt
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Please run 'go fmt ./...' to format your code"
            gofmt -s -d .
            exit 1
          fi
